services:
  postgres:
    # AWS Public ECR mirror of Docker Hub (avoids registry-1.docker.io TLS timeouts).
    image: public.ecr.aws/docker/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppassword}
    ports:
      # Lets Prisma / local tools on the host use localhost:5432 (not hostname "postgres").
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-appdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      pull: false
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Host .env often uses localhost:5433 (safetynet on the machine). In Compose, DB is the postgres service.
      DATABASE_URL: postgresql://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-apppassword}@postgres:5432/${POSTGRES_DB:-appdb}?schema=public
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      pull: false
      args:
        # Empty = browser calls same-origin /api/... (nginx proxies to server). Do not use host .env localhost:3001 here.
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8081:80"

volumes:
  postgres_data:
