name: iaudit

services:
  postgres:
    profiles: [local]
    image: public.ecr.aws/docker/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-appdb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - app

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      pull: false
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:3001/health')
          .then(async (r) => {
            const b = await r.json().catch(() => ({}));
            process.exit(r.ok && b.database === 'connected' ? 0 : 1);
          })
          .catch(() => process.exit(1))
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 120s
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      pull: false
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  postgres_data:
