name: iaudit

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      pull: false
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "3001"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:3001/health')
          .then(async (r) => {
            const b = await r.json().catch(() => ({}));
            process.exit(r.ok && b.database === 'connected' ? 0 : 1);
          })
          .catch(() => process.exit(1))
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 300s
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      pull: false
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1/nginx-health >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - app

networks:
  app:
    driver: bridge
