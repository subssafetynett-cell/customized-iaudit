services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      pull: false
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3001:3001"
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      pull: false
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8081:80"
