server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Hashed Vite bundles — never SPA-fallback to index.html (that causes MIME type errors).
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Root static files (favicon, images referenced from index.html)
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|css|js|map)$ {
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA routes only — HTML shell for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend server
    location /api/ {
        proxy_pass http://server:3001/api/;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check passthrough
    location /health {
        proxy_pass http://server:3001/health;
        proxy_connect_timeout 10s;
        proxy_read_timeout 10s;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        try_files /50x.html =404;
    }
}
