server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 ipv6=off valid=10s;

    client_max_body_size 50m;

    root /usr/share/nginx/html;
    index index.html index.htm;

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|css|js|map)$ {
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        set $api_upstream server:3001;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 360s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors off;
        error_page 502 503 504 = @api_unavailable;
    }

    location /health {
        set $api_upstream server:3001;
        proxy_pass http://$api_upstream/health;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
        proxy_intercept_errors off;
        error_page 502 503 504 = @api_unavailable;
    }

    location @api_unavailable {
        default_type application/json;
        return 502 '{"error":"API server is temporarily unavailable. Please try again shortly."}';
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}
